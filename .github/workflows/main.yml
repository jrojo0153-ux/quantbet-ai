name: QuantBet AI Daily Run

on:
  schedule:
    # Se ejecuta diario a las 8:00 AM hora CDMX (14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch: # Esto activa un botón para que lo corras cuando quieras

jobs:
  run-r-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Instalar librerías necesarias
        run: |
          install.packages(c("httr2", "jsonlite", "dplyr"))
        shell: Rscript {0}

      - name: Ejecutar Predicciones Deportivas
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: Rscript main.R
